
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Imposter Word Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              game: {
                bg: '#0f172a', // Slate 900
                surface: '#1e293b', // Slate 800
                primary: '#6366f1', // Indigo 500
                accent: '#8b5cf6', // Violet 500
                danger: '#ef4444', // Red 500
                success: '#22c55e', // Green 500
              }
            },
            animation: {
              'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'shake': 'shake 0.5s cubic-bezier(.36,.07,.19,.97) both',
              'blob': 'blob 7s infinite',
              'fade-in-up': 'fadeInUp 0.5s ease-out forwards',
              'fade-in-down': 'fadeInDown 0.5s ease-out forwards',
              'flip-in': 'flipIn 0.6s ease-out forwards',
              'bounce-in': 'bounceIn 0.8s cubic-bezier(0.215, 0.610, 0.355, 1.000) both',
              'blink': 'blink 7s infinite',
            },
            keyframes: {
              blink: {
                '0%, 90%, 100%': { transform: 'scaleY(1)' },
                '95%': { transform: 'scaleY(0.1)' },
              },
              shake: {
                '10%, 90%': { transform: 'translate3d(-1px, 0, 0)' },
                '20%, 80%': { transform: 'translate3d(2px, 0, 0)' },
                '30%, 50%, 70%': { transform: 'translate3d(-4px, 0, 0)' },
                '40%, 60%': { transform: 'translate3d(4px, 0, 0)' }
              },
              blob: {
                '0%': { transform: 'translate(0px, 0px) scale(1)' },
                '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                '100%': { transform: 'translate(0px, 0px) scale(1)' }
              },
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' }
              },
              fadeInDown: {
                '0%': { opacity: '0', transform: 'translateY(-20px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' }
              },
              flipIn: {
                 '0%': { transform: 'rotateY(90deg)', opacity: '0' },
                 '100%': { transform: 'rotateY(0deg)', opacity: '1' }
              },
              bounceIn: {
                '0%': { opacity: '0', transform: 'scale3d(0.3, 0.3, 0.3)' },
                '20%': { transform: 'scale3d(1.1, 1.1, 1.1)' },
                '40%': { transform: 'scale3d(0.9, 0.9, 0.9)' },
                '60%': { opacity: '1', transform: 'scale3d(1.03, 1.03, 1.03)' },
                '80%': { transform: 'scale3d(0.97, 0.97, 0.97)' },
                '100%': { opacity: '1', transform: 'scale3d(1, 1, 1)' }
              }
            }
          },
        },
      }
    </script>
    <style>
      body {
        background: linear-gradient(-45deg, #0f172a, #1e1b4b, #2e1065, #000000);
        background-size: 400% 400%;
        animation: gradientBG 15s ease infinite;
        color: white;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        padding: 0;
        min-height: 100vh;
        min-height: -webkit-fill-available;
      }
      #root {
        width: 100%;
        min-height: 100vh;
        overflow-x: hidden;
        overflow-y: auto;
      }
      @keyframes gradientBG {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.1/",
    "react": "https://aistudiocdn.com/react@^19.2.1",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.1/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.31.0",
    "peerjs": "https://esm.sh/peerjs@1.5.4?bundle-deps"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
    <script type="module">
      import { audioService } from './services/audioService.ts';
      // Force fullscreen and unlock audio on first interaction
      window.addEventListener('click', () => {
        audioService.unlock();
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen().catch(e => {
            console.debug("Fullscreen blocked or not supported");
          });
        }
      }, { once: true });
    </script>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
